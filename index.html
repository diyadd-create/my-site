<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой первый сайт</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #4f46e5, #ec4899);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      max-width: 600px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 15px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      padding: 14px 28px;
      font-size: 18px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: white;
      color: #4f46e5;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚀 Привет, я учусь кодить</h1>
    <p>Это мой первый красивый сайт. Я сделал(а) его на GitHub Pages 😎</p>

    <button onclick="alert('Ты красавчик, всё получилось 🔥')">
      Нажми меня
    </button>
  </div>
</body>
</html>
